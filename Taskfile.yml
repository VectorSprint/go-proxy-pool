version: '3'

tasks:
  test:
    desc: Run Go tests
    cmds:
      - go test ./...

  lint:
    desc: Run golangci-lint with the repository config
    cmds:
      - go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4 run ./...

  check:
    desc: Run tests and lint
    cmds:
      - task: test
      - task: lint
